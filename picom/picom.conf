backend = "glx";
vsync = true;
use-damage = true;
glx-no-stencil = true;
glx-copy-from-front = false;

# Rounded corners
corner-radius = 8;
round-borders = 1;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'i3bar'"
];

# Blur behind translucent windows
blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'i3bar'",
    "class_g = 'slop'"
];

# Opacity
inactive-opacity = 0.95;
active-opacity   = 1.00;
frame-opacity    = 1.00;
opacity-rule = [
    "100:class_g = 'ptyxis' && focused",
    "95:class_g  = 'ptyxis' && !focused"
];

# Fading
fading = true;
fade-in-step  = 0.04;
fade-out-step = 0.04;
fade-delta    = 4;
no-fading-openclose = false;

# Misc
shadow = false;
inactive-dim = 0;
detect-transient = true;
detect-client-leader = true;
mark-wmwin-focused = true;
