# Hyprland config for deva — ported from ~/.config/i3/config
# Mod = SUPER, workspaces 1–10, i3 bindings preserved where possible.
# X11-only bits (xrandr, xrdb, picom, xsettingsd, i3lock, feh, autotiling,
# i3-cycle-focus) are dropped or replaced with Wayland equivalents.

################
### MONITORS ###
################

# Pinned from `hyprctl monitors` — MSI MAG 271QPX E2 at its native 240 Hz mode.
monitor = DP-4, 2560x1440@239.99, 0x0, 1

###################
### MY PROGRAMS ###
###################

$terminal    = ptyxis --new-window
$fileManager = nautilus
$menu        = wofi --show drun
$locker      = swaylock -f -C ~/.config/swaylock/config

#############################
### ENVIRONMENT VARIABLES ###
#############################

# NVIDIA 580 on 4080 SUPER — required for Wayland correctness
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland;xcb
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

cursor {
    no_hardware_cursors = true
}

#################
### AUTOSTART ###
#################

exec-once = hyprpaper
exec-once = waybar
exec-once = mako
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = ~/dotfiles/hypr/scripts/idle.sh

# Clipboard history — watch text + images, store to cliphist
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# XDG autostart (replaces i3's `dex --autostart`)
exec-once = dex --autostart --environment Hyprland

# User daemons from startup-services.sh — X11-independent ones keep working
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = copyq
exec-once = gammastep -O 4500
exec-once = sh -c '[ -x "$HOME/.local/bin/greenclip" ] && "$HOME/.local/bin/greenclip" daemon'

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 8
    gaps_out = 2
    border_size = 2
    col.active_border   = rgba(2563ebee)
    col.inactive_border = rgba(171717aa)
    layout = dwindle
    allow_tearing = false
    resize_on_border = false
}

decoration {
    rounding = 6
    active_opacity = 1.0
    inactive_opacity = 1.0
    drop_shadow = false

    blur {
        enabled = false
    }
}

animations {
    enabled = true
    bezier    = snap, 0.2, 1.0, 0.2, 1.0
    animation = windows,    1, 2, snap
    animation = windowsOut, 1, 2, snap, popin 90%
    animation = border,     1, 3, default
    animation = fade,       1, 2, default
    animation = workspaces, 1, 3, snap
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    focus_on_activate = true
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
    vrr = 2                      # adaptive sync inside fullscreen apps
}

#############
### INPUT ###
#############

input {
    kb_layout  = us
    kb_options = caps:escape     # from setxkbmap
    follow_mouse = 0             # i3: focus_follows_mouse no
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

####################
### KEYBINDINGS  ###
####################

$mod = SUPER

# --- App launching ---
bind = $mod, Return,        exec, $terminal
bind = $mod SHIFT, q,       killactive,
bind = $mod, d,             exec, $menu
bind = $mod SHIFT, d,       exec, wofi --show run
bind = $mod SHIFT, v,       exec, pavucontrol
bind = $mod SHIFT, x,       exec, $locker

# --- Screenshots (native Wayland) ---
bind = ,      Print, exec, sh -c 'grim -g "$(slurp)" - | wl-copy && notify-send "Region copied"'
bind = $mod,  Print, exec, sh -c 'grim - | wl-copy && notify-send "Screen copied"'

# --- Power / display ---
bind = $mod SHIFT, e, exec, ~/.config/i3/scripts/powermenu.sh
bind = $mod SHIFT, p, exec, systemctl poweroff
bind = $mod SHIFT, m, exec, hyprctl dispatch dpms off

# --- Clipboard ---
bind = $mod, c, exec, copyq toggle

# --- Notifications (mako) ---
bind = $mod,       n, exec, makoctl dismiss --all
bind = $mod SHIFT, n, exec, makoctl restore

# --- Rofi (runs under Xwayland; keeps your muscle memory) ---
bind = $mod,       Tab,     cyclenext,
bind = $mod SHIFT, Tab,     exec, rofi -show window
bind = $mod SHIFT, Return,  exec, rofi -show ssh
bind = $mod,       period,  exec, rofi -modi emoji -show emoji
bind = $mod SHIFT, w,       exec, networkmanager_dmenu
bind = $mod SHIFT, b,       exec, ~/.local/bin/rofi-bluetooth

# --- Dev workflow ---
bind = $mod,       p, exec, ~/.local/bin/rofi-projects
bind = $mod SHIFT, s, exec, ~/.config/i3/scripts/resurrect-save.sh
bind = $mod SHIFT, o, exec, ~/.config/i3/scripts/resurrect-restore.sh
bind = $mod SHIFT, y, exec, sh -c 'cliphist list | rofi -dmenu -p "clip:" | cliphist decode | wl-copy'

# --- Focus / movement (arrows, like i3) ---
bind = $mod, left,  movefocus, l
bind = $mod, down,  movefocus, d
bind = $mod, up,    movefocus, u
bind = $mod, right, movefocus, r

bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, down,  movewindow, d
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, right, movewindow, r

# --- Splits / layout ---
bind = $mod,       h,     togglesplit,        # i3: split h
bind = $mod,       v,     togglesplit,        # i3: split v  (Hyprland toggles; closest match)
bind = $mod,       f,     fullscreen,
bind = $mod SHIFT, space, togglefloating,
bind = $mod,       e,     pseudo,             # i3: layout toggle split
bind = $mod,       a,     focusurgentorlast,  # i3: focus parent (closest sensible map)

# --- Scratchpad via Hyprland special workspace ---
bind = $mod SHIFT, minus, movetoworkspace, special:scratch
bind = $mod,       minus, togglespecialworkspace, scratch

# --- Resize (quick + mode) ---
bind = $mod CTRL, right, resizeactive, 20 0
bind = $mod CTRL, left,  resizeactive, -20 0
bind = $mod CTRL, down,  resizeactive, 0 20
bind = $mod CTRL, up,    resizeactive, 0 -20

bind = $mod, r, submap, resize
submap = resize
bind = ,left,  resizeactive, -20 0
bind = ,right, resizeactive, 20 0
bind = ,up,    resizeactive, 0 -20
bind = ,down,  resizeactive, 0 20
bind = ,Return, submap, reset
bind = ,Escape, submap, reset
submap = reset

# --- Gaps ---
bind = $mod,       equal, exec, sh -c 'hyprctl keyword general:gaps_in "$(($(hyprctl getoption general:gaps_in -j | jq .int) + 4))"'
bind = $mod SHIFT, equal, exec, sh -c 'hyprctl keyword general:gaps_in "$(($(hyprctl getoption general:gaps_in -j | jq .int) - 4))"'
bind = $mod SHIFT, g,     exec, sh -c 'hyprctl keyword general:gaps_in 0 && hyprctl keyword general:gaps_out 0'

# --- Workspaces 1–10 ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# --- Reload config (i3's $mod+Shift+r) ---
bind = $mod SHIFT, r, exec, hyprctl reload

# --- Cheatsheet ---
bind = $mod, F1, exec, ~/.config/i3/scripts/i3-help.sh

# --- Media keys ---
bindl = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioPlay,        exec, playerctl play-pause
bindl = , XF86AudioPause,       exec, playerctl pause
bindl = , XF86AudioNext,        exec, playerctl next
bindl = , XF86AudioPrev,        exec, playerctl previous

# --- Mouse drag ---
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

############################
### WINDOW / WORKSPACE   ###
############################

# i3 `for_window` rules → Hyprland windowrulev2
windowrulev2 = float,                 class:^(pavucontrol)$
windowrulev2 = size 800 600,          class:^(pavucontrol)$
windowrulev2 = center,                class:^(pavucontrol)$
windowrulev2 = float,                 class:^(blueman-manager)$
windowrulev2 = float,                 class:^(com.github.hluk.copyq)$
windowrulev2 = float,                 title:^(Picture-in-Picture)$
windowrulev2 = pin,                   title:^(Picture-in-Picture)$
windowrulev2 = suppressevent maximize, class:.*

# Subtle transparent terminal (active 0.92 / inactive 0.88)
windowrulev2 = opacity 0.92 0.88, class:^(org\.gnome\.Ptyxis)$
