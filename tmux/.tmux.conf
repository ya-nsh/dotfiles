# ─────────────────────────────────────────────
#  General
# ─────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -g history-limit 10000
set -g base-index 1           # windows start at 1
setw -g pane-base-index 1     # panes start at 1
set -g renumber-windows on    # reorder windows after closing
set -sg escape-time 0         # no delay for escape key

# ─────────────────────────────────────────────
#  Prefix
# ─────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ─────────────────────────────────────────────
#  Key bindings
# ─────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes (more intuitive keys)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New window keeping current path
bind c new-window -c "#{pane_current_path}"

# ─────────────────────────────────────────────
#  Mouse
# ─────────────────────────────────────────────
set -g mouse on

# ─────────────────────────────────────────────
#  Copy mode (vi-style)
# ─────────────────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel
# mouse drag to copy automatically
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# ─────────────────────────────────────────────
#  Status bar
# ─────────────────────────────────────────────
set -g status-position bottom
set -g status-bg colour235
set -g status-fg colour136
set -g status-left " #S "
set -g status-right " %H:%M  %d-%b "
set -g status-left-length 20
set -g status-right-length 30

# Highlight active window
setw -g window-status-current-style fg=colour166,bold

# ─────────────────────────────────────────────
#  Plugins  (managed by tpm)
# ─────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect: also restore vim/nvim sessions
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum: auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize tpm (must be last line)
run '~/.tmux/plugins/tpm/tpm'
