# ─────────────────────────────────────────────
#  General
# ─────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",tmux-256color:RGB"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 10000
set -g base-index 1           # windows start at 1
setw -g pane-base-index 1     # panes start at 1
set -g renumber-windows on    # reorder windows after closing
set -sg escape-time 0         # no delay for escape key

# ─────────────────────────────────────────────
#  Prefix
# ─────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ─────────────────────────────────────────────
#  Key bindings
# ─────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes (more intuitive keys)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New window keeping current path
bind c new-window -c "#{pane_current_path}"

# ─────────────────────────────────────────────
#  Mouse
# ─────────────────────────────────────────────
set -g mouse on

# ─────────────────────────────────────────────
#  Copy mode (vi-style)
# ─────────────────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel
# mouse drag to copy automatically
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# ─────────────────────────────────────────────
#  Plugins  (managed by tpm)
# ─────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'catppuccin/tmux'

# ─────────────────────────────────────────────
#  Catppuccin theme (v2 syntax)
# ─────────────────────────────────────────────
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_date_time_text "%H:%M  %d-%b"

# tmux-resurrect: also restore vim/nvim sessions
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum: auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize tpm — catppuccin must load before status-right is set
run '~/.tmux/plugins/tpm/tpm'

# Status line — set after catppuccin loads so its variables are available
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right-length 100
set -g status-right "#{cpu_percentage} #{E:@catppuccin_status_date_time}"
